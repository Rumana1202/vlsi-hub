<!DOCTYPE html>
<html>
<head>
    <title>VLSI Hub Login</title>

    <style>
        body{
            font-family:Arial;
            background:#0d47a1;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:320px;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:95%;
            padding:10px;
            background:#1976d2;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>VLSI Hub Login</h2>

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <br><br>

    <button onclick="signup()">Sign Up</button>

    <p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtIhYugKfjVTcjQatPZcmzz0HoPLdwASI",
  authDomain: "vlsi-hub.firebaseapp.com",
  projectId: "vlsi-hub",
  storageBucket: "vlsi-hub.firebasestorage.app",
  messagingSenderId: "401888662132",
  appId: "1:401888662132:web:f9e6109be8027ca9bfb721"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
document.getElementById("msg").innerHTML =
"✅ Account Created";
})
.catch((error)=>{
document.getElementById("msg").innerHTML =
error.message;
});

}

window.login = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
window.location.href="index.html";
})
.catch((error)=>{
document.getElementById("msg").innerHTML =
error.message;
});

}

</script>

</body>
</html>
